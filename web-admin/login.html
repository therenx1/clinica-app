<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clínica — Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { border: none; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
    .btn-primary { background: #0d6efd; border: none; border-radius: 8px; padding: 12px; font-weight: 600; }
    .form-control { border-radius: 8px; padding: 12px; border: 1px solid #dee2e6; }
    .logo { width: 60px; height: 60px; background: #0d6efd; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card p-4">
          <div class="text-center mb-4">
            <div class="logo">
              <i class="bi bi-hospital text-white fs-4"></i>
            </div>
            <h4 class="fw-bold">Clínica Admin</h4>
            <p class="text-muted small">Panel de administración</p>
          </div>
          <div id="alerta" class="alert alert-danger d-none"></div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Correo electrónico</label>
            <input type="email" id="email" class="form-control" placeholder="admin@clinica.com">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Contraseña</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••">
          </div>
          <button class="btn btn-primary w-100" onclick="login()">
            <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
          </button>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/api.js"></script>
  <script>
    if (localStorage.getItem('adminToken')) window.location.href = 'pages/dashboard.html';

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const alerta = document.getElementById('alerta');
      try {
        const data = await api.login(email, password);
        if (data.token) {
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('adminNombre', data.admin.nombre);
          window.location.href = 'pages/dashboard.html';
        } else {
          alerta.classList.remove('d-none');
          alerta.textContent = data.error || 'Error al iniciar sesión';
        }
      } catch (e) {
        alerta.classList.remove('d-none');
        alerta.textContent = 'Error de conexión con el servidor';
      }
    }
  </script>
</body>
</html>
