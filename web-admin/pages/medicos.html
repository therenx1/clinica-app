<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Médicos — Clínica Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f0f4f8; }
    .sidebar { width: 250px; min-height: 100vh; background: #1e293b; position: fixed; top: 0; left: 0; }
    .sidebar .logo { padding: 24px; border-bottom: 1px solid #334155; }
    .sidebar .nav-link { color: #94a3b8; padding: 12px 24px; border-radius: 8px; margin: 2px 12px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #334155; color: #fff; }
    .main { margin-left: 250px; padding: 32px; }
    .card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .avatar { width: 44px; height: 44px; border-radius: 50%; background: #0d6efd; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; overflow: hidden; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-preview { width: 100px; height: 100px; border-radius: 50%; background: #e9ecef; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; overflow: hidden; border: 2px dashed #ced4da; }
    .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
    .row-inactivo { opacity: 0.5; }
    .btn-icon { padding: 4px 10px; }
    .horarios-row { background: #f8fafc; }
    .horarios-panel { padding: 20px; border-left: 3px solid #0d6efd; margin: 0 20px; }
    .horario-card { background: white; border-radius: 8px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border: 1px solid #e5e7eb; }
    .dia-badge { display: inline-block; padding: 2px 10px; background: #dbeafe; color: #1e40af; border-radius: 12px; font-size: 0.75rem; font-weight: 600; margin-right: 10px; }
    .hora-range { font-family: monospace; font-weight: 600; color: #334155; }
    .duracion-tag { font-size: 0.75rem; color: #64748b; margin-left: 8px; }
    .expand-btn { cursor: pointer; transition: transform 0.2s; }
    .expand-btn.open { transform: rotate(90deg); }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <i class="bi bi-hospital text-white fs-5 me-2"></i>
      <span class="text-white fw-bold">Clínica Admin</span>
    </div>
    <nav class="mt-3">
      <a href="dashboard.html" class="nav-link d-flex align-items-center gap-2"><i class="bi bi-grid"></i> Dashboard</a>
      <a href="citas.html" class="nav-link d-flex align-items-center gap-2"><i class="bi bi-calendar-check"></i> Citas</a>
      <a href="medicos.html" class="nav-link active d-flex align-items-center gap-2"><i class="bi bi-person-badge"></i> Médicos</a>
      <a href="pacientes.html" class="nav-link d-flex align-items-center gap-2"><i class="bi bi-people"></i> Pacientes</a>
      <a href="reportes.html" class="nav-link d-flex align-items-center gap-2"><i class="bi bi-bar-chart"></i> Reportes</a>
    </nav>
    <div class="position-absolute bottom-0 w-100 p-3">
      <button class="btn btn-outline-danger w-100 btn-sm" onclick="logout()">
        <i class="bi bi-box-arrow-left me-2"></i>Cerrar sesión
      </button>
    </div>
  </div>

  <div class="main">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h4 class="fw-bold mb-0">Médicos</h4>
        <p class="text-muted small mb-0">Gestiona el equipo médico y sus horarios</p>
      </div>
      <button class="btn btn-primary" onclick="abrirModalNuevo()">
        <i class="bi bi-plus-lg me-2"></i>Nuevo médico
      </button>
    </div>

    <div class="card p-4">
      <div class="form-check form-switch mb-3">
        <input class="form-check-input" type="checkbox" id="mostrarInactivos" onchange="cargarMedicos()">
        <label class="form-check-label" for="mostrarInactivos">Mostrar médicos inactivos</label>
      </div>
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th style="width:40px"></th>
            <th>Médico</th>
            <th>Especialidad</th>
            <th>Email</th>
            <th>Teléfono</th>
            <th>Estado</th>
            <th class="text-end">Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaMedicos"></tbody>
      </table>
    </div>
  </div>

  <div class="modal fade" id="modalMedico" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content border-0 rounded-4">
        <div class="modal-header border-0">
          <h5 class="modal-title fw-bold" id="modalTitulo">Nuevo médico</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="avatar-preview" id="preview">
            <i class="bi bi-person text-muted fs-1"></i>
          </div>
          <div class="mb-3 text-center">
            <label class="btn btn-outline-secondary btn-sm">
              <i class="bi bi-camera me-2"></i>Seleccionar foto
              <input type="file" id="foto" accept="image/jpeg,image/png,image/webp" class="d-none" onchange="previsualizar(event)">
            </label>
            <div class="form-text">JPG, PNG o WEBP · máx 5MB</div>
          </div>
          <input type="hidden" id="medicoId">
          <div class="mb-3">
            <label class="form-label fw-semibold">Nombre</label>
            <input type="text" id="nombre" class="form-control" placeholder="Nombre">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Apellido</label>
            <input type="text" id="apellido" class="form-control" placeholder="Apellido">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" id="email" class="form-control" placeholder="email@clinica.com">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Teléfono</label>
            <input type="text" id="telefono" class="form-control" placeholder="999999999">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Especialidad</label>
            <select id="especialidad_id" class="form-select"></select>
          </div>
        </div>
        <div class="modal-footer border-0">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary" id="btnGuardar" onclick="guardarMedico()">
            <span id="btnGuardarTexto">Guardar</span>
            <span class="spinner-border spinner-border-sm d-none" id="btnGuardarSpinner"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalHorario" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content border-0 rounded-4">
        <div class="modal-header border-0">
          <h5 class="modal-title fw-bold" id="modalHorarioTitulo">Nuevo horario</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="horarioId">
          <input type="hidden" id="horarioMedicoId">
          <div class="mb-3">
            <label class="form-label fw-semibold">Día de la semana</label>
            <select id="dia_semana" class="form-select">
              <option value="1">Lunes</option>
              <option value="2">Martes</option>
              <option value="3">Miércoles</option>
              <option value="4">Jueves</option>
              <option value="5">Viernes</option>
              <option value="6">Sábado</option>
              <option value="0">Domingo</option>
            </select>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Hora inicio</label>
              <input type="time" id="hora_inicio" class="form-control" value="08:00">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Hora fin</label>
              <input type="time" id="hora_fin" class="form-control" value="13:00">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Duración de cada cita (minutos)</label>
            <select id="duracion_min" class="form-select">
              <option value="15">15 minutos</option>
              <option value="20">20 minutos</option>
              <option value="30" selected>30 minutos</option>
              <option value="45">45 minutos</option>
              <option value="60">60 minutos</option>
            </select>
          </div>
          <div id="horarioError" class="alert alert-danger d-none"></div>
        </div>
        <div class="modal-footer border-0">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary" onclick="guardarHorario(event)">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalConfirmar" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content border-0 rounded-4">
        <div class="modal-header border-0">
          <h5 class="modal-title fw-bold" id="confirmarTitulo">Confirmar</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p id="confirmarMensaje"></p>
        </div>
        <div class="modal-footer border-0">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-danger" id="btnConfirmar">Confirmar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/ui.js"></script>
<script>
  if (!localStorage.getItem('adminToken')) window.location.href = '../login.html';

  const NOMBRES_FEMENINOS = new Set([
    'maria', 'lucia', 'ana', 'sofia', 'carmen', 'rosa', 'patricia',
    'laura', 'andrea', 'diana', 'elena', 'isabel', 'gabriela', 'valentina',
    'camila', 'fernanda', 'alejandra', 'claudia', 'monica', 'paula',
    'natalia', 'veronica', 'daniela', 'cristina', 'beatriz', 'lorena',
    'raquel', 'silvia', 'mariana', 'julia', 'victoria', 'adriana',
    'leticia', 'pilar', 'teresa', 'francisca', 'esther', 'irene',
    'mercedes', 'carolina', 'angelica', 'yolanda', 'gloria', 'luisa',
    'olga', 'marta', 'sara', 'alicia', 'barbara', 'cecilia', 'elsa',
    'emma', 'eva', 'ines', 'josefa', 'juana', 'lidia', 'lola',
    'luz', 'manuela', 'margarita', 'nuria', 'rocio', 'soledad',
    'susana', 'vanessa', 'wendy', 'yesenia', 'milagros', 'doris'
  ]);

  function tituloMedico(nombre, apellido) {
    const nombreLimpio = (nombre || '').trim();
    const apellidoLimpio = (apellido || '').trim();
    const nombreCompleto = `${nombreLimpio} ${apellidoLimpio}`.trim();
    if (!nombreCompleto) return 'Médico';
    const primerNombre = nombreLimpio
      .split(' ')[0]
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '');
    const prefijo = NOMBRES_FEMENINOS.has(primerNombre) ? 'Dra.' : 'Dr.';
    return `${prefijo} ${nombreCompleto}`;
  }

  let especialidades = [];
  const diasSemana = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];

  async function cargarEspecialidades() {
    try {
      especialidades = await api.getEspecialidades();
      const select = document.getElementById('especialidad_id');
      select.innerHTML = especialidades.map(e => `<option value="${e.id}">${e.nombre}</option>`).join('');
    } catch (error) {
      mostrarToast('No se pudieron cargar las especialidades: ' + error.message);
    }
  }

  async function cargarMedicos() {
    mostrarCargandoTabla('tablaMedicos', 7, 'Cargando médicos...');
    try {
      const incluirInactivos = document.getElementById('mostrarInactivos').checked;
      const medicos = await api.getMedicos(incluirInactivos);
      if (medicos.length === 0) {
        mostrarVacioTabla('tablaMedicos', 7, 'No hay médicos registrados');
        return;
      }
      const tbody = document.getElementById('tablaMedicos');
      tbody.innerHTML = medicos.map(m => {
        const avatarContent = m.foto_url
          ? `<img src="${m.foto_url}" alt="${m.nombre}">`
          : `${m.nombre[0]}${m.apellido[0]}`;
        const rowClass = m.activo ? '' : 'row-inactivo';
        const toggleIcon = m.activo ? 'bi-pause-circle' : 'bi-play-circle';
        const toggleTitle = m.activo ? 'Desactivar' : 'Activar';
        const toggleClass = m.activo ? 'btn-outline-warning' : 'btn-outline-success';
        const nombreFormateado = tituloMedico(m.nombre, m.apellido);
        return `
          <tr class="${rowClass}" data-medico-id="${m.id}">
            <td>
              <i class="bi bi-chevron-right expand-btn" onclick="toggleHorarios(${m.id})" title="Ver horarios"></i>
            </td>
            <td>
              <div class="d-flex align-items-center gap-2">
                <div class="avatar">${avatarContent}</div>
                <span>${nombreFormateado}</span>
              </div>
            </td>
            <td>${m.especialidad}</td>
            <td>${m.email || '—'}</td>
            <td>${m.telefono || '—'}</td>
            <td><span class="badge ${m.activo ? 'bg-success' : 'bg-secondary'}">${m.activo ? 'Activo' : 'Inactivo'}</span></td>
            <td class="text-end">
              <button class="btn btn-sm btn-outline-primary btn-icon" onclick="editarMedico(${m.id})" title="Editar">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-sm ${toggleClass} btn-icon" onclick="toggleEstado(${m.id}, ${!m.activo}, this)" title="${toggleTitle}">
                <i class="bi ${toggleIcon}"></i>
              </button>
              <button class="btn btn-sm btn-outline-danger btn-icon" onclick="eliminarMedico(${m.id}, '${m.nombre}', '${m.apellido}')" title="Eliminar">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
          <tr class="horarios-row d-none" id="horarios-${m.id}">
            <td colspan="7">
              <div class="horarios-panel">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <h6 class="fw-bold mb-0"><i class="bi bi-calendar-week me-2"></i>Horarios de atención</h6>
                  <button class="btn btn-sm btn-primary" onclick="abrirModalHorario(${m.id})">
                    <i class="bi bi-plus-lg me-1"></i>Agregar horario
                  </button>
                </div>
                <div id="horariosLista-${m.id}"></div>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    } catch (error) {
      mostrarErrorTabla('tablaMedicos', 7, error.message, cargarMedicos);
    }
  }

  async function toggleHorarios(medicoId) {
    const fila = document.getElementById(`horarios-${medicoId}`);
    const btn = document.querySelector(`tr[data-medico-id="${medicoId}"] .expand-btn`);
    if (fila.classList.contains('d-none')) {
      fila.classList.remove('d-none');
      btn.classList.add('open');
      await renderHorarios(medicoId);
    } else {
      fila.classList.add('d-none');
      btn.classList.remove('open');
    }
  }

  async function renderHorarios(medicoId) {
    const contenedorId = `horariosLista-${medicoId}`;
    mostrarCargandoContenedor(contenedorId, 'Cargando horarios...');
    try {
      const horarios = await api.getHorarios(medicoId);
      const contenedor = document.getElementById(contenedorId);
      if (horarios.length === 0) {
        contenedor.innerHTML = '<div class="text-center text-muted py-3"><i class="bi bi-calendar-x me-2"></i>Este médico no tiene horarios configurados</div>';
        return;
      }
      contenedor.innerHTML = horarios.map(h => `
        <div class="horario-card">
          <div>
            <span class="dia-badge">${diasSemana[h.dia_semana]}</span>
            <span class="hora-range">${h.hora_inicio.substring(0,5)} — ${h.hora_fin.substring(0,5)}</span>
            <span class="duracion-tag">citas de ${h.duracion_min} min</span>
          </div>
          <div>
            <button class="btn btn-sm btn-outline-primary btn-icon me-1" onclick='editarHorario(${JSON.stringify(h)}, ${medicoId})'>
              <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-sm btn-outline-danger btn-icon" onclick="confirmarEliminarHorario(${h.id}, ${medicoId})">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>
      `).join('');
    } catch (error) {
      document.getElementById(contenedorId).innerHTML =
        `<div class="text-center py-3 text-danger"><i class="bi bi-exclamation-triangle me-2"></i>${error.message}
          <button class="btn btn-sm btn-link" onclick="renderHorarios(${medicoId})">Reintentar</button>
         </div>`;
    }
  }

  function abrirModalHorario(medicoId) {
    document.getElementById('modalHorarioTitulo').textContent = 'Nuevo horario';
    document.getElementById('horarioId').value = '';
    document.getElementById('horarioMedicoId').value = medicoId;
    document.getElementById('dia_semana').value = '1';
    document.getElementById('hora_inicio').value = '08:00';
    document.getElementById('hora_fin').value = '13:00';
    document.getElementById('duracion_min').value = '30';
    document.getElementById('horarioError').classList.add('d-none');
    new bootstrap.Modal(document.getElementById('modalHorario')).show();
  }

  function editarHorario(horario, medicoId) {
    document.getElementById('modalHorarioTitulo').textContent = 'Editar horario';
    document.getElementById('horarioId').value = horario.id;
    document.getElementById('horarioMedicoId').value = medicoId;
    document.getElementById('dia_semana').value = horario.dia_semana;
    document.getElementById('hora_inicio').value = horario.hora_inicio.substring(0,5);
    document.getElementById('hora_fin').value = horario.hora_fin.substring(0,5);
    document.getElementById('duracion_min').value = horario.duracion_min;
    document.getElementById('horarioError').classList.add('d-none');
    new bootstrap.Modal(document.getElementById('modalHorario')).show();
  }

  async function guardarHorario(evt) {
    const btn = evt ? evt.currentTarget : document.querySelector('#modalHorario .btn-primary');
    const id = document.getElementById('horarioId').value;
    const medicoId = document.getElementById('horarioMedicoId').value;
    const data = {
      dia_semana: parseInt(document.getElementById('dia_semana').value),
      hora_inicio: document.getElementById('hora_inicio').value,
      hora_fin: document.getElementById('hora_fin').value,
      duracion_min: parseInt(document.getElementById('duracion_min').value)
    };
    const errorDiv = document.getElementById('horarioError');
    errorDiv.classList.add('d-none');
    const restaurar = bloquearBoton(btn, 'Guardando...');
    try {
      if (id) await api.actualizarHorario(id, data);
      else await api.crearHorario(medicoId, data);
      bootstrap.Modal.getInstance(document.getElementById('modalHorario')).hide();
      renderHorarios(medicoId);
    } catch (error) {
      errorDiv.textContent = error.message;
      errorDiv.classList.remove('d-none');
    } finally {
      restaurar();
    }
  }

  function confirmarEliminarHorario(id, medicoId) {
    document.getElementById('confirmarTitulo').textContent = 'Eliminar horario';
    document.getElementById('confirmarMensaje').innerHTML = '¿Eliminar este horario?<br><small class="text-muted">Las citas ya agendadas en este horario no se verán afectadas.</small>';
    const btn = document.getElementById('btnConfirmar');
    const modal = new bootstrap.Modal(document.getElementById('modalConfirmar'));
    btn.onclick = async () => {
      const restaurar = bloquearBoton(btn, 'Eliminando...');
      try {
        await api.eliminarHorario(id);
        modal.hide();
        renderHorarios(medicoId);
      } catch (error) {
        modal.hide();
        mostrarToast('Error al eliminar: ' + error.message);
      } finally {
        restaurar();
      }
    };
    modal.show();
  }

  function previsualizar(event) {
    const file = event.target.files[0];
    if (!file) return;
    const preview = document.getElementById('preview');
    const url = URL.createObjectURL(file);
    preview.innerHTML = `<img src="${url}" alt="Preview">`;
  }

  function abrirModalNuevo() {
    document.getElementById('modalTitulo').textContent = 'Nuevo médico';
    document.getElementById('medicoId').value = '';
    document.getElementById('nombre').value = '';
    document.getElementById('apellido').value = '';
    document.getElementById('email').value = '';
    document.getElementById('telefono').value = '';
    document.getElementById('foto').value = '';
    document.getElementById('preview').innerHTML = '<i class="bi bi-person text-muted fs-1"></i>';
    new bootstrap.Modal(document.getElementById('modalMedico')).show();
  }

  async function editarMedico(id) {
    try {
      const m = await api.getMedico(id);
      document.getElementById('modalTitulo').textContent = 'Editar médico';
      document.getElementById('medicoId').value = m.id;
      document.getElementById('nombre').value = m.nombre;
      document.getElementById('apellido').value = m.apellido;
      document.getElementById('email').value = m.email || '';
      document.getElementById('telefono').value = m.telefono || '';
      document.getElementById('especialidad_id').value = m.especialidad_id;
      document.getElementById('foto').value = '';
      const preview = document.getElementById('preview');
      preview.innerHTML = m.foto_url
        ? `<img src="${m.foto_url}" alt="Foto">`
        : '<i class="bi bi-person text-muted fs-1"></i>';
      new bootstrap.Modal(document.getElementById('modalMedico')).show();
    } catch (error) {
      mostrarToast('No se pudo cargar el médico: ' + error.message);
    }
  }

  async function guardarMedico() {
    const btn = document.getElementById('btnGuardar');
    const id = document.getElementById('medicoId').value;
    const fd = new FormData();
    fd.append('nombre', document.getElementById('nombre').value);
    fd.append('apellido', document.getElementById('apellido').value);
    fd.append('email', document.getElementById('email').value);
    fd.append('telefono', document.getElementById('telefono').value);
    fd.append('especialidad_id', document.getElementById('especialidad_id').value);
    const foto = document.getElementById('foto').files[0];
    if (foto) fd.append('foto', foto);

    const restaurar = bloquearBoton(btn, id ? 'Actualizando...' : 'Guardando...');
    try {
      if (id) await api.actualizarMedico(id, fd);
      else await api.crearMedico(fd);
      bootstrap.Modal.getInstance(document.getElementById('modalMedico')).hide();
      cargarMedicos();
    } catch (error) {
      mostrarToast('Error: ' + error.message);
    } finally {
      restaurar();
    }
  }

  async function toggleEstado(id, nuevoEstado, btn) {
    const restaurar = bloquearBoton(btn, '');
    try {
      await api.cambiarEstadoMedico(id, nuevoEstado);
      cargarMedicos();
    } catch (error) {
      mostrarToast('Error al cambiar estado: ' + error.message);
      restaurar();
    }
  }

  function eliminarMedico(id, nombre, apellido) {
    document.getElementById('confirmarTitulo').textContent = 'Eliminar médico';
    document.getElementById('confirmarMensaje').innerHTML = `¿Eliminar permanentemente a <strong>${tituloMedico(nombre, apellido)}</strong>?<br><small class="text-muted">Esta acción no se puede deshacer. Si el médico tiene citas, se recomienda desactivarlo en lugar de eliminar.</small>`;
    const btn = document.getElementById('btnConfirmar');
    const modal = new bootstrap.Modal(document.getElementById('modalConfirmar'));
    btn.onclick = async () => {
      const restaurar = bloquearBoton(btn, 'Eliminando...');
      try {
        await api.eliminarMedico(id);
        modal.hide();
        cargarMedicos();
      } catch (error) {
        modal.hide();
        if (error.data && error.data.tieneCitas) {
          mostrarToast(`No se puede eliminar: tiene ${error.data.totalCitas} cita(s) registrada(s). Desactívalo en su lugar.`);
        } else {
          mostrarToast('Error: ' + error.message);
        }
      } finally {
        restaurar();
      }
    };
    modal.show();
  }

  function logout() {
    localStorage.removeItem('adminToken');
    localStorage.removeItem('adminNombre');
    window.location.href = '../login.html';
  }

  cargarEspecialidades();
  cargarMedicos();
</script>
</body>
</html>
