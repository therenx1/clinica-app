<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Citas — Clínica Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f0f4f8; }
    .sidebar { width: 250px; min-height: 100vh; background: #1e293b; position: fixed; top: 0; left: 0; }
    .sidebar .logo { padding: 24px; border-bottom: 1px solid #334155; }
    .sidebar .nav-link { color: #94a3b8; padding: 12px 24px; border-radius: 8px; margin: 2px 12px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #334155; color: #fff; }
    .main { margin-left: 250px; padding: 32px; }
    .card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .badge-pendiente { background: #fff3cd; color: #856404; }
    .badge-confirmada { background: #d1e7dd; color: #0f5132; }
    .badge-cancelada { background: #f8d7da; color: #842029; }
    .badge-completada { background: #cff4fc; color: #055160; }
    .doc-tag { font-size: 0.7rem; font-weight: 600; padding: 2px 6px; border-radius: 4px; margin-right: 6px; }
    .doc-tag.dni { background: #e7f1ff; color: #0d6efd; }
    .doc-tag.ce { background: #fff3e0; color: #e65100; }
    .filtros { background: #f8fafc; border-radius: 12px; padding: 16px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <i class="bi bi-hospital text-white fs-5 me-2"></i>
      <span class="text-white fw-bold">Clínica Admin</span>
    </div>
    <nav class="mt-3">
      <a href="dashboard.html" class="nav-link d-flex align-items-center gap-2"><i class="bi bi-grid"></i> Dashboard</a>
      <a href="citas.html" class="nav-link active d-flex align-items-center gap-2"><i class="bi bi-calendar-check"></i> Citas</a>
      <a href="medicos.html" class="nav-link d-flex align-items-center gap-2"><i class="bi bi-person-badge"></i> Médicos</a>
      <a href="pacientes.html" class="nav-link d-flex align-items-center gap-2"><i class="bi bi-people"></i> Pacientes</a>
      <a href="reportes.html" class="nav-link d-flex align-items-center gap-2"><i class="bi bi-bar-chart"></i> Reportes</a>
    </nav>
    <div class="position-absolute bottom-0 w-100 p-3">
      <button class="btn btn-outline-danger w-100 btn-sm" onclick="logout()">
        <i class="bi bi-box-arrow-left me-2"></i>Cerrar sesión
      </button>
    </div>
  </div>

  <div class="main">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h4 class="fw-bold mb-0">Gestión de Citas</h4>
        <p class="text-muted small mb-0">Administra todas las citas médicas</p>
      </div>
    </div>

    <div class="card p-4">
      <div class="filtros mb-3">
        <div class="row g-2">
          <div class="col-md-3">
            <label class="form-label small fw-semibold">Documento</label>
            <input type="text" id="f_documento" class="form-control form-control-sm" placeholder="Buscar por DNI/CE">
          </div>
          <div class="col-md-2">
            <label class="form-label small fw-semibold">Estado</label>
            <select id="f_estado" class="form-select form-select-sm">
              <option value="">Todos</option>
              <option value="pendiente">Pendiente</option>
              <option value="confirmada">Confirmada</option>
              <option value="completada">Completada</option>
              <option value="cancelada">Cancelada</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label small fw-semibold">Desde</label>
            <input type="date" id="f_fecha_desde" class="form-control form-control-sm">
          </div>
          <div class="col-md-2">
            <label class="form-label small fw-semibold">Hasta</label>
            <input type="date" id="f_fecha_hasta" class="form-control form-control-sm">
          </div>
          <div class="col-md-2">
            <label class="form-label small fw-semibold">Por página</label>
            <select id="f_limit" class="form-select form-select-sm">
              <option value="10">10</option>
              <option value="20" selected>20</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </div>
          <div class="col-md-1 d-flex align-items-end">
            <button class="btn btn-outline-secondary btn-sm w-100" onclick="limpiarFiltros()" title="Limpiar filtros">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
        </div>
      </div>

      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Documento</th>
            <th>Paciente</th>
            <th>Médico</th>
            <th>Especialidad</th>
            <th>Fecha</th>
            <th>Hora</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaCitas"></tbody>
      </table>

      <div id="paginacion"></div>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script>
    if (!localStorage.getItem('adminToken')) window.location.href = '../login.html';

    let paginaActual = 1;

    function obtenerFiltros() {
      return {
        page: paginaActual,
        limit: parseInt(document.getElementById('f_limit').value),
        documento: document.getElementById('f_documento').value.trim(),
        estado: document.getElementById('f_estado').value,
        fecha_desde: document.getElementById('f_fecha_desde').value,
        fecha_hasta: document.getElementById('f_fecha_hasta').value
      };
    }

    async function cargarCitas() {
      mostrarCargandoTabla('tablaCitas', 9, 'Cargando citas...');
      try {
        const { data, pagination } = await api.getCitas(obtenerFiltros());
        if (data.length === 0) {
          mostrarVacioTabla('tablaCitas', 9, paginaActual === 1 && !hayFiltrosActivos()
            ? 'No hay citas registradas'
            : 'No hay resultados para los filtros aplicados');
        } else {
          renderCitas(data);
        }
        renderPaginacion('paginacion', pagination, irAPagina);
      } catch (error) {
        mostrarErrorTabla('tablaCitas', 9, error.message, cargarCitas);
      }
    }

    function hayFiltrosActivos() {
      const f = obtenerFiltros();
      return f.documento || f.estado || f.fecha_desde || f.fecha_hasta;
    }

    function renderCitas(data) {
      const tbody = document.getElementById('tablaCitas');
      tbody.innerHTML = data.map(c => {
        const tipo = (c.paciente_tipo_doc || 'DNI').toLowerCase();
        const docHtml = c.paciente_dni
          ? `<span class="doc-tag ${tipo}">${(c.paciente_tipo_doc || 'DNI').toUpperCase()}</span><strong>${c.paciente_dni}</strong>`
          : '<span class="text-muted">Sin documento</span>';
        return `
          <tr>
            <td>${c.id}</td>
            <td>${docHtml}</td>
            <td>${c.paciente_nombre} ${c.paciente_apellido}</td>
            <td>Dr. ${c.medico_nombre} ${c.medico_apellido}</td>
            <td>${c.especialidad}</td>
            <td>${new Date(c.fecha).toLocaleDateString('es-PE')}</td>
            <td>${c.hora}</td>
            <td><span class="badge badge-${c.estado} px-2 py-1 rounded-pill">${c.estado}</span></td>
            <td>
              <select class="form-select form-select-sm" style="width:140px" onchange="cambiarEstado(${c.id}, this.value, this)">
                <option value="pendiente" ${c.estado==='pendiente'?'selected':''}>Pendiente</option>
                <option value="confirmada" ${c.estado==='confirmada'?'selected':''}>Confirmada</option>
                <option value="completada" ${c.estado==='completada'?'selected':''}>Completada</option>
                <option value="cancelada" ${c.estado==='cancelada'?'selected':''}>Cancelada</option>
              </select>
            </td>
          </tr>
        `;
      }).join('');
    }

    function irAPagina(nuevaPagina) {
      paginaActual = nuevaPagina;
      cargarCitas();
    }

    function aplicarFiltros() {
      paginaActual = 1;
      cargarCitas();
    }

    const aplicarFiltrosDebounced = debounce(aplicarFiltros, 400);

    function limpiarFiltros() {
      document.getElementById('f_documento').value = '';
      document.getElementById('f_estado').value = '';
      document.getElementById('f_fecha_desde').value = '';
      document.getElementById('f_fecha_hasta').value = '';
      paginaActual = 1;
      cargarCitas();
    }

    async function cambiarEstado(id, estado, selectEl) {
      selectEl.disabled = true;
      try {
        await api.updateCita(id, estado);
        cargarCitas();
      } catch (error) {
        mostrarToast('Error al actualizar la cita: ' + error.message);
        selectEl.disabled = false;
        cargarCitas();
      }
    }

    document.getElementById('f_documento').addEventListener('input', aplicarFiltrosDebounced);
    document.getElementById('f_estado').addEventListener('change', aplicarFiltros);
    document.getElementById('f_fecha_desde').addEventListener('change', aplicarFiltros);
    document.getElementById('f_fecha_hasta').addEventListener('change', aplicarFiltros);
    document.getElementById('f_limit').addEventListener('change', aplicarFiltros);

    function logout() {
      localStorage.removeItem('adminToken');
      localStorage.removeItem('adminNombre');
      window.location.href = '../login.html';
    }

    cargarCitas();
  </script>
</body>
</html>
