<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes — Clínica Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background: #f0f4f8; }
    .sidebar { width: 250px; min-height: 100vh; background: #1e293b; position: fixed; top: 0; left: 0; }
    .sidebar .logo { padding: 24px; border-bottom: 1px solid #334155; }
    .sidebar .nav-link { color: #94a3b8; padding: 12px 24px; border-radius: 8px; margin: 2px 12px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #334155; color: #fff; }
    .main { margin-left: 250px; padding: 32px; }
    .card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .stat-card { border-left: 4px solid; }
    .stat-card.blue { border-color: #0d6efd; }
    .stat-card.green { border-color: #198754; }
    .stat-card.orange { border-color: #fd7e14; }
    .stat-card.red { border-color: #dc3545; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <i class="bi bi-hospital text-white fs-5 me-2"></i>
      <span class="text-white fw-bold">Clínica Admin</span>
    </div>
    <nav class="mt-3">
      <a href="dashboard.html" class="nav-link d-flex align-items-center gap-2"><i class="bi bi-grid"></i> Dashboard</a>
      <a href="citas.html" class="nav-link d-flex align-items-center gap-2"><i class="bi bi-calendar-check"></i> Citas</a>
      <a href="medicos.html" class="nav-link d-flex align-items-center gap-2"><i class="bi bi-person-badge"></i> Médicos</a>
      <a href="pacientes.html" class="nav-link d-flex align-items-center gap-2"><i class="bi bi-people"></i> Pacientes</a>
      <a href="reportes.html" class="nav-link active d-flex align-items-center gap-2"><i class="bi bi-bar-chart"></i> Reportes</a>
    </nav>
    <div class="position-absolute bottom-0 w-100 p-3">
      <button class="btn btn-outline-danger w-100 btn-sm" onclick="logout()">
        <i class="bi bi-box-arrow-left me-2"></i>Cerrar sesión
      </button>
    </div>
  </div>

  <div class="main">
    <div class="mb-4">
      <h4 class="fw-bold mb-0">Reportes</h4>
      <p class="text-muted small mb-0">Estadísticas generales de la clínica</p>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <div class="card p-3 stat-card blue">
          <p class="text-muted small mb-1">Total citas</p>
          <h3 class="fw-bold mb-0" id="totalCitas">—</h3>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card p-3 stat-card orange">
          <p class="text-muted small mb-1">Pendientes</p>
          <h3 class="fw-bold mb-0" id="citasPendientes">—</h3>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card p-3 stat-card green">
          <p class="text-muted small mb-1">Completadas</p>
          <h3 class="fw-bold mb-0" id="citasCompletadas">—</h3>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card p-3 stat-card red">
          <p class="text-muted small mb-1">Pacientes</p>
          <h3 class="fw-bold mb-0" id="totalPacientes">—</h3>
        </div>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-md-6">
        <div class="card p-4">
          <h6 class="fw-bold mb-3">Citas por especialidad</h6>
          <canvas id="graficaEspecialidades"></canvas>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card p-4">
          <h6 class="fw-bold mb-3">Estado de citas</h6>
          <canvas id="graficaEstados"></canvas>
        </div>
      </div>
    </div>
  </div>
  <script src="../assets/js/api.js"></script>
<script src="../assets/js/ui.js"></script>
<script>
  if (!localStorage.getItem('adminToken')) window.location.href = '../login.html';

  async function cargarReportes() {
    ['totalCitas','citasPendientes','citasCompletadas','totalPacientes'].forEach(id => {
      document.getElementById(id).innerHTML = '<div class="spinner-border spinner-border-sm text-primary"></div>';
    });
    try {
      const data = await api.getReportes();
      document.getElementById('totalCitas').textContent = data.totalCitas;
      document.getElementById('citasPendientes').textContent = data.citasPendientes;
      document.getElementById('citasCompletadas').textContent = data.citasCompletadas;
      document.getElementById('totalPacientes').textContent = data.totalPacientes;

      new Chart(document.getElementById('graficaEspecialidades'), {
        type: 'bar',
        data: {
          labels: data.citasPorEspecialidad.map(e => e.especialidad),
          datasets: [{
            label: 'Citas',
            data: data.citasPorEspecialidad.map(e => e.total),
            backgroundColor: ['#0d6efd','#198754','#fd7e14','#6610f2','#dc3545']
          }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
      });

      new Chart(document.getElementById('graficaEstados'), {
        type: 'doughnut',
        data: {
          labels: ['Pendientes', 'Completadas', 'Otras'],
          datasets: [{
            data: [
              data.citasPendientes,
              data.citasCompletadas,
              data.totalCitas - data.citasPendientes - data.citasCompletadas
            ],
            backgroundColor: ['#fd7e14', '#198754', '#6c757d']
          }]
        },
        options: { responsive: true }
      });
    } catch (error) {
      mostrarToast('No se pudieron cargar los reportes: ' + error.message);
      ['totalCitas','citasPendientes','citasCompletadas','totalPacientes'].forEach(id => {
        document.getElementById(id).textContent = '—';
      });
    }
  }

  function logout() {
    localStorage.removeItem('adminToken');
    localStorage.removeItem('adminNombre');
    window.location.href = '../login.html';
  }

  cargarReportes();
</script>
</body>
</html>
