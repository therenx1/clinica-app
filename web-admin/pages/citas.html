<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Citas — Clínica Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f0f4f8; }
    .sidebar { width: 250px; min-height: 100vh; background: #1e293b; position: fixed; top: 0; left: 0; }
    .sidebar .logo { padding: 24px; border-bottom: 1px solid #334155; }
    .sidebar .nav-link { color: #94a3b8; padding: 12px 24px; border-radius: 8px; margin: 2px 12px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #334155; color: #fff; }
    .main { margin-left: 250px; padding: 32px; }
    .card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .badge-pendiente { background: #fff3cd; color: #856404; }
    .badge-confirmada { background: #d1e7dd; color: #0f5132; }
    .badge-cancelada { background: #f8d7da; color: #842029; }
    .badge-completada { background: #cff4fc; color: #055160; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <i class="bi bi-hospital text-white fs-5 me-2"></i>
      <span class="text-white fw-bold">Clínica Admin</span>
    </div>
    <nav class="mt-3">
      <a href="dashboard.html" class="nav-link d-flex align-items-center gap-2"><i class="bi bi-grid"></i> Dashboard</a>
      <a href="citas.html" class="nav-link active d-flex align-items-center gap-2"><i class="bi bi-calendar-check"></i> Citas</a>
      <a href="medicos.html" class="nav-link d-flex align-items-center gap-2"><i class="bi bi-person-badge"></i> Médicos</a>
      <a href="pacientes.html" class="nav-link d-flex align-items-center gap-2"><i class="bi bi-people"></i> Pacientes</a>
      <a href="reportes.html" class="nav-link d-flex align-items-center gap-2"><i class="bi bi-bar-chart"></i> Reportes</a>
    </nav>
    <div class="position-absolute bottom-0 w-100 p-3">
      <button class="btn btn-outline-danger w-100 btn-sm" onclick="logout()">
        <i class="bi bi-box-arrow-left me-2"></i>Cerrar sesión
      </button>
    </div>
  </div>

  <div class="main">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h4 class="fw-bold mb-0">Gestión de Citas</h4>
        <p class="text-muted small mb-0">Administra todas las citas médicas</p>
      </div>
    </div>

    <div class="card p-4">
      <div class="mb-3">
        <input type="text" id="buscador" class="form-control" placeholder="Buscar por DNI del paciente..." oninput="filtrar()">
      </div>
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>DNI</th>
            <th>Paciente</th>
            <th>Médico</th>
            <th>Especialidad</th>
            <th>Fecha</th>
            <th>Hora</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaCitas"></tbody>
      </table>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script>
    if (!localStorage.getItem('adminToken')) window.location.href = '../login.html';

    let citas = [];

    async function cargarCitas() {
      citas = await api.getCitas();
      renderCitas(citas);
    }

    function renderCitas(data) {
      const tbody = document.getElementById('tablaCitas');
      tbody.innerHTML = data.map(c => `
        <tr>
          <td>${c.id}</td>
          <td><strong>${c.paciente_dni || 'Sin DNI'}</strong></td>
          <td>${c.paciente_nombre} ${c.paciente_apellido}</td>
          <td>Dr. ${c.medico_nombre} ${c.medico_apellido}</td>
          <td>${c.especialidad}</td>
          <td>${new Date(c.fecha).toLocaleDateString('es-PE')}</td>
          <td>${c.hora}</td>
          <td><span class="badge badge-${c.estado} px-2 py-1 rounded-pill">${c.estado}</span></td>
          <td>
            <select class="form-select form-select-sm" style="width:140px" onchange="cambiarEstado(${c.id}, this.value)">
              <option value="pendiente" ${c.estado==='pendiente'?'selected':''}>Pendiente</option>
              <option value="confirmada" ${c.estado==='confirmada'?'selected':''}>Confirmada</option>
              <option value="completada" ${c.estado==='completada'?'selected':''}>Completada</option>
              <option value="cancelada" ${c.estado==='cancelada'?'selected':''}>Cancelada</option>
            </select>
          </td>
        </tr>
      `).join('');
    }

    // Función de filtrado actualizada para buscar estrictamente por DNI
    function filtrar() {
      const q = document.getElementById('buscador').value.trim();
      const filtradas = citas.filter(c => 
        c.paciente_dni && c.paciente_dni.toString().includes(q)
      );
      renderCitas(filtradas);
    }

    async function cambiarEstado(id, estado) {
      await api.updateCita(id, estado);
      cargarCitas();
    }

    function logout() {
      localStorage.removeItem('adminToken');
      localStorage.removeItem('adminNombre');
      window.location.href = '../login.html';
    }

    cargarCitas();
  </script>
</body>
</html>
