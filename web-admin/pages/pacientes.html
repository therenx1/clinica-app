<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pacientes — Clínica Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f0f4f8; }
    .sidebar { width: 250px; min-height: 100vh; background: #1e293b; position: fixed; top: 0; left: 0; }
    .sidebar .logo { padding: 24px; border-bottom: 1px solid #334155; }
    .sidebar .nav-link { color: #94a3b8; padding: 12px 24px; border-radius: 8px; margin: 2px 12px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #334155; color: #fff; }
    .main { margin-left: 250px; padding: 32px; }
    .card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: #6610f2; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; }
    .doc-tag { font-size: 0.7rem; font-weight: 600; padding: 2px 6px; border-radius: 4px; margin-right: 6px; }
    .doc-tag.dni { background: #e7f1ff; color: #0d6efd; }
    .doc-tag.ce { background: #fff3e0; color: #e65100; }
    .filtros { background: #f8fafc; border-radius: 12px; padding: 16px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <i class="bi bi-hospital text-white fs-5 me-2"></i>
      <span class="text-white fw-bold">Clínica Admin</span>
    </div>
    <nav class="mt-3">
      <a href="dashboard.html" class="nav-link d-flex align-items-center gap-2"><i class="bi bi-grid"></i> Dashboard</a>
      <a href="citas.html" class="nav-link d-flex align-items-center gap-2"><i class="bi bi-calendar-check"></i> Citas</a>
      <a href="medicos.html" class="nav-link d-flex align-items-center gap-2"><i class="bi bi-person-badge"></i> Médicos</a>
      <a href="pacientes.html" class="nav-link active d-flex align-items-center gap-2"><i class="bi bi-people"></i> Pacientes</a>
      <a href="reportes.html" class="nav-link d-flex align-items-center gap-2"><i class="bi bi-bar-chart"></i> Reportes</a>
    </nav>
    <div class="position-absolute bottom-0 w-100 p-3">
      <button class="btn btn-outline-danger w-100 btn-sm" onclick="logout()">
        <i class="bi bi-box-arrow-left me-2"></i>Cerrar sesión
      </button>
    </div>
  </div>

  <div class="main">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h4 class="fw-bold mb-0">Pacientes</h4>
        <p class="text-muted small mb-0">Lista de pacientes registrados</p>
      </div>
    </div>

    <div class="card p-4">
      <div class="filtros mb-3">
        <div class="row g-2">
          <div class="col-md-6">
            <label class="form-label small fw-semibold">Buscar</label>
            <input type="text" id="f_search" class="form-control form-control-sm" placeholder="Nombre, email o documento">
          </div>
          <div class="col-md-3">
            <label class="form-label small fw-semibold">Tipo de documento</label>
            <select id="f_tipo_doc" class="form-select form-select-sm">
              <option value="">Todos</option>
              <option value="DNI">DNI</option>
              <option value="CE">CE</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label small fw-semibold">Por página</label>
            <select id="f_limit" class="form-select form-select-sm">
              <option value="10">10</option>
              <option value="20" selected>20</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </div>
          <div class="col-md-1 d-flex align-items-end">
            <button class="btn btn-outline-secondary btn-sm w-100" onclick="limpiarFiltros()" title="Limpiar">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
        </div>
      </div>

      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>Paciente</th>
            <th>Email</th>
            <th>Documento</th>
            <th>Teléfono</th>
            <th>Registrado</th>
          </tr>
        </thead>
        <tbody id="tablaPacientes"></tbody>
      </table>

      <div id="paginacion"></div>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script>
    if (!localStorage.getItem('adminToken')) window.location.href = '../login.html';

    let paginaActual = 1;

    function obtenerFiltros() {
      return {
        page: paginaActual,
        limit: parseInt(document.getElementById('f_limit').value),
        search: document.getElementById('f_search').value.trim(),
        tipo_documento: document.getElementById('f_tipo_doc').value
      };
    }

    function hayFiltrosActivos() {
      const f = obtenerFiltros();
      return f.search || f.tipo_documento;
    }

    async function cargarPacientes() {
      mostrarCargandoTabla('tablaPacientes', 5, 'Cargando pacientes...');
      try {
        const { data, pagination } = await api.getPacientes(obtenerFiltros());
        if (data.length === 0) {
          mostrarVacioTabla('tablaPacientes', 5, paginaActual === 1 && !hayFiltrosActivos()
            ? 'No hay pacientes registrados'
            : 'No hay resultados para los filtros aplicados');
        } else {
          renderPacientes(data);
        }
        renderPaginacion('paginacion', pagination, irAPagina);
      } catch (error) {
        mostrarErrorTabla('tablaPacientes', 5, error.message, cargarPacientes);
      }
    }

    function renderPacientes(data) {
      const tbody = document.getElementById('tablaPacientes');
      tbody.innerHTML = data.map(p => {
        const tipo = (p.tipo_documento || 'DNI').toLowerCase();
        const docHtml = p.dni
          ? `<span class="doc-tag ${tipo}">${(p.tipo_documento || 'DNI').toUpperCase()}</span>${p.dni}`
          : '—';
        return `
          <tr>
            <td>
              <div class="d-flex align-items-center gap-2">
                <div class="avatar">${p.nombre[0]}${p.apellido[0]}</div>
                <span>${p.nombre} ${p.apellido}</span>
              </div>
            </td>
            <td>${p.email}</td>
            <td>${docHtml}</td>
            <td>${p.telefono || '—'}</td>
            <td>${new Date(p.created_at).toLocaleDateString('es-PE')}</td>
          </tr>
        `;
      }).join('');
    }

    function irAPagina(nuevaPagina) {
      paginaActual = nuevaPagina;
      cargarPacientes();
    }

    function aplicarFiltros() {
      paginaActual = 1;
      cargarPacientes();
    }

    const aplicarFiltrosDebounced = debounce(aplicarFiltros, 400);

    function limpiarFiltros() {
      document.getElementById('f_search').value = '';
      document.getElementById('f_tipo_doc').value = '';
      paginaActual = 1;
      cargarPacientes();
    }

    document.getElementById('f_search').addEventListener('input', aplicarFiltrosDebounced);
    document.getElementById('f_tipo_doc').addEventListener('change', aplicarFiltros);
    document.getElementById('f_limit').addEventListener('change', aplicarFiltros);

    function logout() {
      localStorage.removeItem('adminToken');
      localStorage.removeItem('adminNombre');
      window.location.href = '../login.html';
    }

    cargarPacientes();
  </script>
</body>
</html>
